<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - BookHaven</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo"><img src="assets/images/logo/logo.png" alt="BookHaven Logo" style="height: 50px;"></a>
            <nav class="nav-menu">
                <ul class="nav-links">
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="products.html">Cửa hàng</a></li>
                </ul>
                <div class="nav-actions">
                    <a href="cart.html" class="action-icon cart-icon"><i class="fa-solid fa-cart-shopping"></i><span class="cart-count">0</span></a>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content container page-checkout">
        <h1 class="page-title">Thanh toán</h1>
        <div class="checkout-layout">
            <form class="checkout-form box-shadow-panel" id="checkoutForm">
                <h3>Thông tin giao hàng</h3>
                <div class="form-group">
                    <label>Họ và tên *</label>
                    <input type="text" id="chkName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Số điện thoại *</label>
                    <input type="tel" id="chkPhone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Địa chỉ nhận hàng *</label>
                    <textarea id="chkAddress" class="form-control" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Xác nhận đặt hàng</button>
            </form>
            
            <div class="checkout-summary box-shadow-panel">
                <h3>Đơn hàng của bạn</h3>
                <div id="checkoutItemsList" class="checkout-items-list"></div>
                <hr class="summary-divider">
                <div class="summary-row summary-total">
                    <span>Tổng thanh toán:</span>
                    <span id="checkoutTotal" class="total-value">0 đ</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-container">
            <div class="footer-col"><a href="index.html" class="logo"><img src="assets/images/logo/logo.png" alt="BookHaven Logo" style="height: 50px;"></a></div>
        </div>
    </footer>
    <script src="assets/js/products.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
